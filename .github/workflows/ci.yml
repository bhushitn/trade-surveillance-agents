name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install ".[serve,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
      - name: Tests and eval regression gate
        # test_detectors_ground_truth.py asserts recall, precision, and FPR
        # floors on the frozen dataset, so a detection regression fails the build.
        run: pytest -q
