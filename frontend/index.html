<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surveillance review queue</title>
<style>
  body { font: 14px/1.45 -apple-system, system-ui, sans-serif; margin: 0; display: flex; height: 100vh; color: #1a1a2e; }
  #queue { width: 380px; overflow-y: auto; border-right: 1px solid #ddd; }
  #queue h1 { font-size: 15px; padding: 12px 14px; margin: 0; background: #16213e; color: #fff; }
  .row { padding: 9px 14px; border-bottom: 1px solid #eee; cursor: pointer; }
  .row:hover { background: #f0f3fa; }
  .row.active { background: #e2e9f8; }
  .row .id { font-weight: 600; }
  .badge { font-size: 11px; padding: 1px 7px; border-radius: 9px; margin-left: 6px; }
  .badge.pending { background: #ffe9a8; }
  .badge.approved { background: #c9ecc9; }
  .badge.dismissed { background: #e6e6e6; }
  .badge.pattern { background: #dbe4ff; }
  #detail { flex: 1; overflow-y: auto; padding: 18px 26px; }
  #detail h2 { margin-top: 0; }
  table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #eee; font-size: 13px; }
  textarea { width: 100%; min-height: 110px; font: inherit; padding: 8px; box-sizing: border-box; }
  button { font: inherit; padding: 7px 16px; margin-right: 8px; border: 0; border-radius: 5px; cursor: pointer; }
  #approve { background: #2a7a2a; color: #fff; }
  #dismiss { background: #8a8a8a; color: #fff; }
  .muted { color: #667; font-size: 12px; }
  .note { background: #fff7df; border: 1px solid #eedd99; padding: 8px 12px; border-radius: 5px; font-size: 13px; }
</style>
</head>
<body>
  <div id="queue"><h1>Review queue</h1><div id="rows"></div></div>
  <div id="detail"><p class="muted">Select a case.</p></div>
  <script src="/app.js"></script>
</body>
</html>
